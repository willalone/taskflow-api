name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      PORT: 3000
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://taskflow:taskflow@localhost:5432/taskflow?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters-long

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npm run db:generate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run openapi:validate
      - run: npm test
